name: Docs Validation

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # pin v7.0.0
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin @v6.4.0
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: docs/package-lock.json
    - name: Install dependencies
      working-directory: ./docs
      run: npm ci
    - name: Check for lint and formatting errors
      working-directory: ./docs
      run: |
        npm run lint
        npm run format -- --check
    - name: Ensure docs artifact is up-to-date
      working-directory: ./docs
      run: |
        npm run build
        git diff --quiet
